services:
  - type: web
    name: study-manager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── DB (Neon or Supabase の接続文字列を手動で設定) ──
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"   # Neon / Supabase は SSL 必須

      # ── Google OAuth ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false     # 例: https://study-manager.onrender.com/auth/callback

      # ── JWT (Render がランダム生成) ──
      - key: JWT_SECRET_KEY
        generateValue: true

      # ── LINE (任意) ──
      - key: LINE_CHANNEL_ACCESS_TOKEN
        value: ""

      # ── Cron 保護キー (Render がランダム生成) ──
      - key: CRON_SECRET
        generateValue: true
