services:
  - type: web
    name: study-manager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"

      # ── LINE Login（認証用）──
      - key: LINE_LOGIN_CHANNEL_ID
        sync: false
      - key: LINE_LOGIN_CHANNEL_SECRET
        sync: false
      - key: LINE_LOGIN_REDIRECT_URI
        sync: false     # https://your-app.onrender.com/auth/callback

      # ── LINE Messaging API（通知用）──
      - key: LINE_CHANNEL_ACCESS_TOKEN
        value: ""

      # ── JWT・Cron ──
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
